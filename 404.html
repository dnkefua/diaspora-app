<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page not found · The Diaspora App</title>
<meta name="description" content="The page you were looking for has moved or no longer exists. Find diaspora businesses, events, and stories from the homepage.">
<meta name="robots" content="noindex,follow">
<link rel="icon" type="image/png" href="Media%20resources/TheDiaspora%20app%20logo%203D.png">
<link rel="canonical" href="https://www.thediaspora.app/404.html">
<meta name="theme-color" content="#0A0A0A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0A0A0A;--paper:#FBF8F2;--brass:#B7924A;--brass-soft:#D9BE88;--muted:#6B6357;--line:rgba(10,10,10,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center;line-height:1.6}
.logo{width:120px;height:auto;margin-bottom:32px;border-radius:16px;background:#fff;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,0.08)}
.kicker{font-size:11px;letter-spacing:0.32em;text-transform:uppercase;color:var(--brass);margin-bottom:18px;font-weight:500}
h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(56px,9vw,120px);line-height:1;letter-spacing:-0.02em;margin-bottom:18px}
h1 em{font-style:italic;color:var(--brass)}
p{max-width:520px;color:var(--muted);font-size:16px;margin-bottom:34px}
.row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:10px;padding:15px 28px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:0.28em;text-transform:uppercase;text-decoration:none;border:1px solid transparent;transition:all 0.2s}
.btn-dark{background:var(--ink);color:var(--paper)}
.btn-dark:hover{background:var(--brass)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--ink)}
.btn-ghost:hover{background:var(--ink);color:var(--paper)}
.suggest{margin-top:48px;font-size:13px;color:var(--muted)}
.suggest a{color:var(--ink);border-bottom:1px solid var(--brass);text-decoration:none;margin:0 8px}
.suggest a:hover{color:var(--brass)}
</style>
</head>
<body>
<img class="logo" src="Media%20resources/TheDiaspora%20app%20logo%203D.png" alt="The Diaspora App logo">
<div class="kicker">Error 404</div>
<h1>Lost in <em>diaspora.</em></h1>
<p>The page you were looking for has moved, was renamed, or never existed. Don't worry — the rest of the community is right here.</p>
<div class="row">
  <a href="/" class="btn btn-dark">Back to home</a>
  <a href="/feed.html" class="btn btn-ghost">Browse businesses</a>
</div>
<p class="suggest">
  Try <a href="/feed.html">Directory</a> · <a href="/events.html">Events</a> · <a href="/blog.html">Blog</a> · <a href="/about.html">About</a> · <a href="/contact.html">Contact</a>
</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="Media%20resources/TheDiaspora%20app%20logo%203D.png">
<link rel="apple-touch-icon" href="Media%20resources/TheDiaspora%20app%20logo%203D.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Sign in — Diaspora</title>
<meta name="description" content="Sign in to your Diaspora account.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0A0A0A">
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="canonical" href="https://www.thediaspora.app/login-firebase.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://www.gstatic.com">
<link rel="preconnect" href="https://identitytoolkit.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-left">
    <a href="index.html" class="auth-logo">
      <img src="Media%20resources/TheDiaspora%20app%20logo%203D.png" alt="The Diaspora App logo">
      <span class="auth-logo-text">Diaspora <small>Global app</small></span>
    </a>
    <div>
      <h1 class="auth-headline">Welcome <em>back.</em></h1>
      <p class="auth-sub">Sign in to continue your journey with the global diaspora community.</p>
    </div>
    <div class="auth-foot"><span>© 2026 Diaspora</span><span>Privacy</span><span>Terms</span></div>
  </aside>

  <main class="auth-right">
    <div class="auth-card">
      <a href="index.html" class="auth-back">← Back to home</a>
      <h2 class="auth-title">Sign in to Diaspora</h2>
      <p class="auth-desc">Access your profile, saved businesses, and more.</p>

      <div class="social-row">
        <button class="social-btn" onclick="socialLogin('Google')">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Google
        </button>
        <button class="social-btn" onclick="socialLogin('Apple')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M17.05 12.04c-.03-3.2 2.61-4.73 2.73-4.81-1.49-2.18-3.81-2.48-4.64-2.51-1.97-.2-3.85 1.16-4.85 1.16-1.02 0-2.55-1.13-4.2-1.1-2.16.03-4.16 1.26-5.27 3.19-2.25 3.89-.58 9.65 1.61 12.81 1.07 1.55 2.35 3.29 4.02 3.23 1.61-.07 2.22-1.04 4.17-1.04 1.94 0 2.49 1.04 4.2 1.01 1.73-.03 2.83-1.58 3.89-3.14 1.23-1.8 1.74-3.55 1.77-3.64-.04-.02-3.4-1.3-3.43-5.16zM13.87 2.88c.88-1.07 1.47-2.55 1.31-4.03-1.26.05-2.8.84-3.71 1.9-.81.94-1.53 2.45-1.34 3.89 1.41.11 2.85-.71 3.74-1.76z"/></svg>
          Apple
        </button>
      </div>
      <div class="divider">or with email</div>

      <div class="err" id="err"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" required placeholder="you@diaspora.com">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Your password">
        </div>

        <div class="form-foot">
          <a class="link" href="forgot-password.html">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Sign in →</button>
      </form>

      <p class="alt-link">New to Diaspora? <a href="signup-firebase.html" class="link">Create an account</a></p>
    </div>
  </main>
</div>

<script type="module">
import { auth, db, signInWithEmailAndPassword, doc, getDoc, onAuthStateChanged } from './firebase-config.js';

// Check if already logged in
onAuthStateChanged(auth, (user) => {
  if (user) {
    // Already logged in, redirect to feed
    window.location.href = 'feed.html';
  }
});

window.socialLogin = function(provider) {
  alert(`${provider} sign-in requires OAuth configuration in Firebase Console.\n\nFor demo, please use email login.`);
};

window.handleLogin = async function(e) {
  e.preventDefault();
  const err = document.getElementById('err');
  const submitBtn = document.getElementById('submit-btn');

  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  try {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    // Sign in with Firebase Auth
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // Get user profile from Firestore
    const userDoc = await getDoc(doc(db, 'users', user.uid));

    const profile = userDoc.exists()
      ? { uid: user.uid, email: user.email, ...userDoc.data() }
      : { uid: user.uid, email: user.email, firstName: user.displayName || 'Diaspora', lastName: 'Member' };

    // Store minimal session info for the static pages that read localStorage.
    localStorage.setItem('diaspora_user', JSON.stringify(profile));

    // Redirect to feed
    window.location.href = 'feed.html';

  } catch (error) {
    console.error('Login error:', error);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign in →';

    let message = 'Failed to sign in. Please check your credentials.';
    if (error.code === 'auth/user-not-found') {
      message = 'No account found for that email.';
    } else if (error.code === 'auth/wrong-password') {
      message = 'Incorrect password.';
    } else if (error.code === 'auth/invalid-email') {
      message = 'Invalid email address.';
    } else if (error.code === 'auth/too-many-requests') {
      message = 'Too many failed attempts. Please try again later.';
    }

    err.textContent = message;
    err.classList.add('show');
  }
};
</script>
</body>
</html>
